<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HRMS - Huespedes</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <header>
      <h1>Modulo de Huespedes</h1>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="huespedes.html">Huespedes</a>
        <a href="habitaciones.html">Habitaciones</a>
        <a href="reservas.html">Reservas</a>
        <a href="facturas.html">Facturas</a>
        <a href="preferencias.html">Preferencias</a>
        <a href="encuestas.html">Encuestas</a>
      </nav>
    </header>

    <main>
      <section class="card">
        <h3>Registrar huesped</h3>
        <form id="form-huesped">
          <input name="dni_pasaporte" placeholder="DNI/Pasaporte" required />
          <input name="nombres" placeholder="Nombres" required />
          <input name="apellidos" placeholder="Apellidos" required />
          <input name="nacionalidad" placeholder="Nacionalidad" required />
          <input name="telefono" placeholder="Telefono" required />
          <input name="correo" type="email" placeholder="Correo" required />
          <button type="submit">Guardar</button>
          <button type="button" class="secondary" id="btn-cargar">Recargar tabla</button>
        </form>
      </section>

      <section class="card" style="margin-top: 12px">
        <h3>Lista de huespedes</h3>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>DNI</th>
              <th>Nombres</th>
              <th>Apellidos</th>
              <th>Nacionalidad</th>
              <th>Telefono</th>
              <th>Correo</th>
            </tr>
          </thead>
          <tbody id="tbody-huespedes"></tbody>
        </table>
      </section>
    </main>

    <script src="assets/app.js"></script>
    <script>
      async function cargarHuespedes() {
        const data = await fetchApi("/huespedes");
        renderTable("tbody-huespedes", data, ["ID_HUESPED", "DNI_PASAPORTE", "NOMBRES", "APELLIDOS", "NACIONALIDAD", "TELEFONO", "CORREO"]);
      }

      attachSubmit("form-huesped", async (payload) => {
        await fetchApi("/huespedes", { method: "POST", body: JSON.stringify(payload) });
        await cargarHuespedes();
      });

      document.getElementById("btn-cargar").addEventListener("click", cargarHuespedes);
      cargarHuespedes();
    </script>
  </body>
</html>
