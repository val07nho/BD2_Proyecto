<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HRMS - Facturas</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <header>
      <h1>Modulo de Facturacion</h1>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="huespedes.html">Huespedes</a>
        <a href="habitaciones.html">Habitaciones</a>
        <a href="reservas.html">Reservas</a>
        <a href="facturas.html">Facturas</a>
        <a href="preferencias.html">Preferencias</a>
        <a href="encuestas.html">Encuestas</a>
      </nav>
    </header>

    <main>
      <section class="card">
        <h3>Emitir factura</h3>
        <form id="form-factura">
          <input name="fecha_emision" type="date" required />
          <input name="monto_total" type="number" step="0.01" placeholder="Monto total" required />
          <select name="metodo_pago" required>
            <option value="Tarjeta">Tarjeta</option>
            <option value="Transferencia">Transferencia</option>
            <option value="Efectivo">Efectivo</option>
          </select>
          <input name="id_reserva" type="number" placeholder="ID Reserva" required />
          <button type="submit">Guardar</button>
          <button type="button" class="secondary" id="btn-cargar">Recargar tabla</button>
        </form>
      </section>

      <section class="card" style="margin-top: 12px">
        <h3>Lista de facturas</h3>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Numero</th>
              <th>Fecha</th>
              <th>Monto</th>
              <th>Metodo</th>
              <th>ID Reserva</th>
            </tr>
          </thead>
          <tbody id="tbody-facturas"></tbody>
        </table>
      </section>
    </main>

    <script src="assets/app.js"></script>
    <script>
      async function cargarFacturas() {
        const data = await fetchApi("/facturas");
        renderTable("tbody-facturas", data, ["ID_FACTURA", "NUMERO_FACTURA", "FECHA_EMISION", "MONTO_TOTAL", "METODO_PAGO", "ID_RESERVA"]);
      }

      attachSubmit("form-factura", async (payload) => {
        await fetchApi("/facturas", { method: "POST", body: JSON.stringify(payload) });
        await cargarFacturas();
      });

      document.getElementById("btn-cargar").addEventListener("click", cargarFacturas);
      cargarFacturas();
    </script>
  </body>
</html>
