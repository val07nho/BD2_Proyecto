<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HRMS - Encuestas</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <header>
      <h1>Modulo de Encuestas (MongoDB)</h1>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="huespedes.html">Huespedes</a>
        <a href="habitaciones.html">Habitaciones</a>
        <a href="reservas.html">Reservas</a>
        <a href="facturas.html">Facturas</a>
        <a href="preferencias.html">Preferencias</a>
        <a href="encuestas.html">Encuestas</a>
      </nav>
    </header>

    <main>
      <section class="card">
        <h3>Registrar encuesta</h3>
        <form id="form-encuesta">
          <input name="idHuesped" type="number" placeholder="ID Huesped" required />
          <input name="fecha" type="date" required />
          <input name="calificacion" type="number" min="1" max="5" placeholder="Calificacion 1-5" required />
          <textarea name="comentario" placeholder="Comentario"></textarea>
          <button type="submit">Guardar</button>
          <button type="button" class="secondary" id="btn-cargar">Recargar tabla</button>
        </form>
      </section>

      <section class="card" style="margin-top: 12px">
        <h3>Lista de encuestas</h3>
        <table>
          <thead>
            <tr>
              <th>ID Huesped</th>
              <th>Fecha</th>
              <th>Calificacion</th>
              <th>Comentario</th>
            </tr>
          </thead>
          <tbody id="tbody-encuestas"></tbody>
        </table>
      </section>
    </main>

    <script src="assets/app.js"></script>
    <script>
      async function cargarEncuestas() {
        const data = await fetchApi("/encuestas");
        renderTable("tbody-encuestas", data, ["idHuesped", "fecha", "calificacion", "comentario"]);
      }

      attachSubmit("form-encuesta", async (payload) => {
        await fetchApi("/encuestas", { method: "POST", body: JSON.stringify(payload) });
        await cargarEncuestas();
      });

      document.getElementById("btn-cargar").addEventListener("click", cargarEncuestas);
      cargarEncuestas();
    </script>
  </body>
</html>
